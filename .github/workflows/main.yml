name: Auto Publish Release
on:
  push:
    tags:
      - 'v*' # سيعمل الأكشن فوراً عند رفع أي تاجم يبدأ بحرف v مثل v1.2.1

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Publish Draft Release
        uses: actions/github-script@v6
        with:
          script: |
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            
            // البحث عن المسودة (Draft) التي تتطابق مع التاج الحالي
            const draft = releases.find(r => r.draft === true);
            
            if (draft) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: draft.id,
                draft: false,
                make_latest: "true"
              });
              console.log(`Successfully published: ${draft.tag_name}`);
            } else {
              console.log("No draft release found to publish.");
            }
